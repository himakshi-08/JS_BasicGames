<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Roll Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:400px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:20px;
}

img{
    width:150px;
    height:150px;
    margin:20px 0;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

#result{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}

</style>
</head>
<body>

<div class="container">

    <h1>🎲 Roll The Dice 🎲</h1>

    <img id="dice"
         src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Dice-1-b.svg"
         alt="Dice">

    <br>

    <button onclick="rollDice()">Roll Dice</button>

    <div id="result"></div>

</div>

<script>

function rollDice(){

    let number = Math.floor(Math.random()*6)+1;

    let diceImage = document.getElementById("dice");

    diceImage.src =
    "https://upload.wikimedia.org/wikipedia/commons/" +
    (
        number==1 ? "1/1b/Dice-1-b.svg" :
        number==2 ? "5/5f/Dice-2-b.svg" :
        number==3 ? "b/b1/Dice-3-b.svg" :
        number==4 ? "f/fd/Dice-4-b.svg" :
        number==5 ? "0/08/Dice-5-b.svg" :
                    "2/26/Dice-6-b.svg"
    );

    document.getElementById("result").innerHTML =
    "You rolled : " + number;
}

</script>

</body>
</html>
