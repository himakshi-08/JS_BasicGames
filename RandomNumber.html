<!DOCTYPE html>
<html>
<head>
    <title>Random Number Generator</title>
</head>
<body>

    <h2>Random Number Generator</h2>

    <button onclick="generate()">Generate Number</button>

    <h3 id="result"></h3>

    <script>
        function generate() {
            let num = Math.floor(Math.random() * 100) + 1;
            document.getElementById("result").innerHTML = num;
        }
    </script>

</body>
</html>
