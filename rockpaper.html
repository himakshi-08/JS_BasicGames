<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    width:400px;
}

h1{
    margin-bottom:20px;
    color:#333;
}

.buttons{
    margin:20px 0;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.rock{
    background:#ff7675;
    color:white;
}

.paper{
    background:#74b9ff;
    color:white;
}

.scissors{
    background:#55efc4;
    color:black;
}

.info{
    margin-top:15px;
    font-size:20px;
    color:#444;
}

#result{
    margin-top:20px;
    font-size:28px;
    font-weight:bold;
}

.win{
    color:green;
}

.lose{
    color:red;
}

.draw{
    color:orange;
}

</style>
</head>

<body>

<div class="container">

    <h1>✊ Rock Paper Scissors ✋</h1>

    <div class="buttons">
        <button class="rock" onclick="play('rock')">🪨 Rock</button>
        <button class="paper" onclick="play('paper')">📄 Paper</button>
        <button class="scissors" onclick="play('scissors')">✂️ Scissors</button>
    </div>

    <div class="info" id="user"></div>
    <div class="info" id="computer"></div>

    <div id="result"></div>

</div>

<script>

function play(user){

    const choices = ["rock","paper","scissors"];

    const comp = choices[Math.floor(Math.random()*3)];

    document.getElementById("user").innerHTML =
    "👤 Your Choice: <b>" + user + "</b>";

    document.getElementById("computer").innerHTML =
    "💻 Computer Choice: <b>" + comp + "</b>";

    let result = document.getElementById("result");

    if(user === comp){

        result.innerHTML = "🤝 Draw!";
        result.className = "draw";

    }
    else if(
        (user === "rock" && comp === "scissors") ||
        (user === "paper" && comp === "rock") ||
        (user === "scissors" && comp === "paper")
    ){

        result.innerHTML = "🎉 You Win!";
        result.className = "win";

    }
    else{

        result.innerHTML = "😢 You Lose!";
        result.className = "lose";

    }
}

</script>

</body>
</html>
